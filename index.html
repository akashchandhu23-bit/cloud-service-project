<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cloud Event Booking</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Cloud-Based Event Booking System</h1>

<p>Book your favourite events online.</p>

</header>

<div class="container">

<div class="card">

<h2>Tech Conference 2026</h2>

<p>Date : July 15</p>

<p>Location : Mysuru</p>

<button onclick="book('Tech Conference 2026')">
Book Now
</button>

</div>

<div class="card">

<h2>Music Festival</h2>

<p>Date : August 10</p>

<p>Location : Bengaluru</p>

<button onclick="book('Music Festival')">
Book Now
</button>

</div>

<div class="card">

<h2>Startup Meetup</h2>

<p>Date : September 5</p>

<p>Location : Hyderabad</p>

<button onclick="book('Startup Meetup')">
Book Now
</button>

</div>

</div>

<div class="booking">

<h2>Booking Form</h2>

<input type="text" id="name" placeholder="Enter Name">

<input type="email" id="email" placeholder="Enter Email">

<input type="text" id="event" readonly>

<button onclick="submitBooking()">
Confirm Booking
</button>

</div>

<script src="script.js"></script>

</body>
</html>
